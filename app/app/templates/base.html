<!doctype html><html><head><meta charset="utf-8"><title>PCAP Mapper</title><link rel="stylesheet" href="/static/style.css"></head><body class="dark"><header class="app-header"><h1>PCAP Mapper</h1><nav class="main-nav"><a href="/{% if nav_active_job_id %}?job={{ nav_active_job_id }}{% endif %}">Dashboard</a><div class="nav-dropdown nav-text-dropdown"><span class="nav-droptext" tabindex="0">Analyze ▾</span><div class="nav-dropdown-content"><a href="/assets{% if nav_active_job_id %}?job={{ nav_active_job_id }}{% endif %}">Assets</a><a href="/communications{% if nav_active_job_id %}?job={{ nav_active_job_id }}{% endif %}">Communications</a><a href="/log-sources{% if nav_active_job_id %}?job={{ nav_active_job_id }}{% endif %}">Log Sources</a><a href="/events{% if nav_active_job_id %}?job={{ nav_active_job_id }}{% endif %}">Events</a></div></div><div class="nav-dropdown nav-text-dropdown"><span class="nav-droptext" tabindex="0">MITRE Heat Map ▾</span><div class="nav-dropdown-content"><a href="/mitre/coverage{% if nav_active_job_id %}?job={{ nav_active_job_id }}{% endif %}">Coverage</a><a href="/mitre/data-sources{% if nav_active_job_id %}?job={{ nav_active_job_id }}{% endif %}">Data Sources</a><a href="/mitre/normalized-events{% if nav_active_job_id %}?job={{ nav_active_job_id }}{% endif %}">Normalized Events</a></div></div><div class="nav-dropdown nav-text-dropdown"><span class="nav-droptext" tabindex="0">Rules ▾</span><div class="nav-dropdown-content"><a href="/rules{% if nav_active_job_id %}?job={{ nav_active_job_id }}{% endif %}">Detection Rules</a><a href="/network-rules{% if nav_active_job_id %}?job={{ nav_active_job_id }}{% endif %}">Network Rules</a></div></div><div class="nav-dropdown nav-text-dropdown"><span class="nav-droptext" tabindex="0">Telemetry ▾</span><div class="nav-dropdown-content"><a href="/telemetry/plugins{% if nav_active_job_id %}?job={{ nav_active_job_id }}{% endif %}">Plugin Registry</a><a href="/telemetry/profile{% if nav_active_job_id %}?job={{ nav_active_job_id }}{% endif %}">Environment Profile</a></div></div><a href="/reports{% if nav_active_job_id %}?job={{ nav_active_job_id }}{% endif %}">Reports</a><a href="/previous{% if nav_active_job_id %}?job={{ nav_active_job_id }}{% endif %}">Jobs</a><a href="/settings{% if nav_active_job_id %}?job={{ nav_active_job_id }}{% endif %}">Settings</a></nav><div class="header-actions"><button id="dark">Dark Mode</button><div class="active-job-picker"><form method="post" action="/select-job"><input type="hidden" name="next" value="{{ request.full_path }}"><label>Active Job <select name="job" onchange="this.form.submit()">{% for j in nav_jobs %}<option value="{{ j.get('id') }}" {% if j.get('id') == nav_active_job_id %}selected{% endif %}>{{ j.get('name') or ('Job '+j.get('id','')[:8]) }} · {{ j.get('state','unknown') }}</option>{% else %}<option value="">No jobs</option>{% endfor %}</select></label></form></div></div></header><main>{% block body %}{% endblock %}</main><script>const b=document.body; const darkBtn=document.getElementById('dark'); function updateThemeButton(){darkBtn.textContent=b.classList.contains('dark')?'Light Mode':'Dark Mode';} if(localStorage.dark==='0')b.classList.remove('dark'); else b.classList.add('dark'); updateThemeButton(); darkBtn.onclick=()=>{b.classList.toggle('dark');localStorage.dark=b.classList.contains('dark')?'1':'0';updateThemeButton();};
(function(){const blocks=[...document.querySelectorAll('.rule-validation-progress')]; if(!blocks.length)return; blocks.forEach(block=>{const job=block.dataset.job; if(!job)return; const bar=block.querySelector('.bar>div'); const pct=block.querySelector('.rv-percent'); const msg=block.querySelector('.rv-message'); const key='rv-reloaded-'+job; async function poll(){try{const r=await fetch('/api/rule-validation/'+job,{cache:'no-store'}); if(!r.ok)return; const d=await r.json(); const p=Math.max(0,Math.min(100,parseInt(d.progress||0))); if(d.status==='running'||p>0){block.style.display='block';} if(d.status==='running'){sessionStorage.removeItem(key);} if(bar)bar.style.width=p+'%'; if(pct)pct.textContent=p+'%'; if(msg)msg.textContent=d.message||d.status||''; if(d.status==='complete'&&sessionStorage.getItem(key)!=='1'){sessionStorage.setItem(key,'1'); location.reload(); return;} if(d.status==='running'){setTimeout(poll,1000);} }catch(e){setTimeout(poll,2000);} } poll();});})();</script>{% block scripts %}{% endblock %}</body></html>
